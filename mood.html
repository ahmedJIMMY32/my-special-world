<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>عالمك الخاص ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #020205;
            --glass: rgba(255, 255, 255, 0.03);
            --current-mood-color: #ffffff;
        }

        /* جعل الانتقالات أكثر سلاسة وبطئاً (1.2 ثانية) */
        * { box-sizing: border-box; transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1); -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            background: var(--bg-dark);
            color: white;
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #mood-bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2; pointer-events: none;
            background: radial-gradient(circle at center, transparent 0%, var(--bg-dark) 100%);
            transition: background 1.2s ease, opacity 1.2s ease;
            opacity: 0.5;
        }

        #space-canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }

        header {
            position: relative; z-index: 10; text-align: center;
            margin-bottom: 30px; opacity: 0; animation: fadeIn 3s forwards 0.5s;
            width: 100%;
        }

        header h1 {
            font-weight: 200; 
            font-size: clamp(1.8rem, 8vw, 2.5rem);
            color: #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
            margin: 0;
        }

        .galaxy-container { 
            position: relative; 
            z-index: 10; 
            width: 100%; 
            max-width: 900px; 
            height: 500px;
        }

        .planet {
            position: absolute; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; cursor: pointer;
            background: var(--glass); border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            text-align: center;
        }

        .planet::before {
            content: ''; position: absolute; width: 120%; height: 120%;
            border-radius: 50%; background: var(--glow); filter: blur(30px);
            opacity: 0.15; z-index: -1;
            transition: 1.2s;
        }

        .planet:hover, .planet:active {
            transform: scale(1.05) translateY(-5px); 
            border-color: var(--glow-color); 
            box-shadow: 0 0 30px var(--glow-color); 
        }

        .p1 { width: 150px; height: 150px; top: 10%; left: 10%; --glow-color: #ff85a2; --glow: radial-gradient(#ff85a2, transparent); animation: float 7s infinite ease-in-out; } 
        .p2 { width: 170px; height: 170px; bottom: 15%; left: 20%; --glow-color: #4da3ff; --glow: radial-gradient(#4da3ff, transparent); animation: float 9s infinite ease-in-out -2s; } 
        .p3 { width: 160px; height: 160px; top: 20%; right: 15%; --glow-color: #c5a059; --glow: radial-gradient(#c5a059, transparent); animation: float 8s infinite ease-in-out -4s; } 
        .p4 { width: 140px; height: 140px; bottom: 10%; right: 10%; --glow-color: #a285ff; --glow: radial-gradient(#a285ff, transparent); animation: float 10s infinite ease-in-out -1s; }

        .planet span { font-size: clamp(0.9rem, 4vw, 1.1rem); color: #fff; padding: 10px; }

        @keyframes float { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(5px, -15px); } }

        @media (max-width: 768px) {
            body { justify-content: flex-start; padding-top: 40px; }
            .galaxy-container { height: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
            .planet { position: relative; top: auto !important; left: auto !important; right: auto !important; bottom: auto !important; width: 100% !important; height: auto !important; aspect-ratio: 1 / 1; }
        }

        .galaxy-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 1000;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; backdrop-filter: blur(15px);
            padding: 20px;
            /* سلاسة ظهور النافذة السوداء */
            transition: all 1.2s ease;
        }

        .galaxy-overlay.active { opacity: 1; visibility: visible; }

        .modal-wrapper { position: relative; width: 100%; max-width: 500px; }

        .msg-box {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 20px; border-radius: 30px; width: 100%; text-align: center;
            /* سلاسة حركة صندوق الرسالة */
            transition: transform 1.2s cubic-bezier(0.2, 1, 0.3, 1);
            transform: scale(0.8) translateY(20px);
        }

        .galaxy-overlay.active .msg-box { transform: scale(1) translateY(0); }

        .sticker {
            position: absolute; width: 100px; height: 100px; right: -30px; top: -30px;
            font-size: 60px; z-index: 1002; opacity: 0; transform: scale(0);
            transition: all 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .sticker.show { opacity: 1; transform: scale(1) rotate(10deg); }
        .msg-box h2 { font-size: 1.8rem; margin-bottom: 15px; color: var(--current-mood-color); }
        .msg-box p { font-size: 1.2rem; line-height: 1.5; color: #ddd; }
        .close-btn { margin-top: 30px; background: white; border: none; padding: 10px 35px; border-radius: 50px; cursor: pointer; font-weight: 700; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="mood-bg-glow"></div>
    <canvas id="space-canvas"></canvas>

    <header>
        <h1>أنتي في قلبي</h1>
        <p>عالم هادي مفيش فيه غيرك.. اختاري مودك ✨</p>
    </header>

    <div class="galaxy-container">
        <div class="planet p1" onclick="openMood('وحشتيني اوي اوي', 'غيبتك بتخلي اليوم ملوش طعم.. كأن النور مطفي في العالم كله. وحشتيني يا أجمل صدفة في حياتي.', '🥺', '#ff85a2')">
            <span>وحشتيني ❤️</span>
        </div>
        <div class="planet p2" onclick="openMood('حقك على قلبي', 'ميهونش عليا أشوفك زعلانة وانتِ اللي بتضحكي الدنيا كلها.. حقك عليا يروح قلبي.', '😿', '#4da3ff')">
            <span>زعلانة مني 😢</span>
        </div>
        <div class="planet p3" onclick="openMood('انتِ قوية', 'مهما كان يومك صعب، افتكري إنك بطلة في عيني. أنا دايمًا جنبك ومعاكي في كل خطوة.. كملي يا روحي انا فخور بيكِ وبكل ال بتعمليه.', '👑', '#c5a059')">
            <span>محتاجة تشجيع 💪</span>
        </div>
        <div class="planet p4" onclick="openMood('فصلة حب', 'لو الدنيا زحمة عليكي، تعالي نهرب هنا. ضحكتك هي المكان اللي برتاح فيه من كل دوشة العالم.', '🌸', '#a285ff')">
            <span>زهقانة شوية 🥱</span>
        </div>
    </div>

    <div class="galaxy-overlay" id="overlay">
        <div class="modal-wrapper">
            <div class="sticker" id="moodSticker"></div>
            <div class="msg-box">
                <h2 id="title"></h2>
                <p id="text"></p>
                <button class="close-btn" onclick="closeMood()">إغلاق</button>
            </div>
        </div>
    </div>

    <script>
        let activeColor = "#ffffff";
        function openMood(t, m, emoji, color) {
            activeColor = color;
            document.documentElement.style.setProperty('--current-mood-color', color);
            const glow = document.getElementById('mood-bg-glow');
            glow.style.background = `radial-gradient(circle at center, ${color}44 0%, #020205 100%)`;
            glow.style.opacity = '1';
            document.getElementById('title').innerText = t;
            document.getElementById('text').innerText = m;
            document.getElementById('moodSticker').innerText = emoji;
            document.getElementById('overlay').classList.add('active');
            // تأخير ظهور الإيموجي قليلاً ليكون متناغماً مع حركة النافذة
            setTimeout(() => { document.getElementById('moodSticker').classList.add('show'); }, 800);
        }

        function closeMood() {
            document.getElementById('overlay').classList.remove('active');
            document.getElementById('moodSticker').classList.remove('show');
            document.getElementById('mood-bg-glow').style.opacity = '0.5';
            document.getElementById('mood-bg-glow').style.background = `radial-gradient(circle at center, transparent 0%, #020205 100%)`;
            activeColor = "#ffffff";
        }

        const canvas = document.getElementById('space-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        let shootingStars = [];

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        class Star {
            constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 1.2; this.opacity = Math.random(); }
            draw() { ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }

        class ShootingStar {
            constructor() { this.reset(); }
            reset() { this.x = Math.random() * canvas.width; this.y = 0; this.len = Math.random() * 80 + 10; this.speed = Math.random() * 10 + 5; this.active = false; }
            update() {
                if(this.active) { this.x -= this.speed; this.y += this.speed; if (this.x < -100 || this.y > canvas.height) this.reset(); }
                else if(Math.random() < 0.005) this.active = true;
            }
            draw() {
                if(!this.active) return;
                ctx.strokeStyle = activeColor; 
                ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(this.x, this.y); ctx.lineTo(this.x + this.len, this.y - this.len); ctx.stroke();
            }
        }

        for (let i = 0; i < 200; i++) stars.push(new Star());
        for (let i = 0; i < 2; i++) shootingStars.push(new ShootingStar());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => s.draw());
            shootingStars.forEach(s => { s.update(); s.draw(); });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
